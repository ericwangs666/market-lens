name: Generate daily market data

on:
  schedule:
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate latest data
        env:
          KPL_SECTOR_STRENGTH_URL: ${{ secrets.KPL_SECTOR_STRENGTH_URL }}
          KPL_COOKIE: ${{ secrets.KPL_COOKIE }}
        run: python scripts/fetch-market-data.py

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily market data"
          file_pattern: data.js daily/*.json realtime/*.json market-site/data.js market-site/daily/*.json market-site/realtime/*.json
